name: covidapp
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  animated_text_kit: ^4.2.2
  pie_chart: ^5.3.2
  http: ^1.1.0
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  get: ^4.6.6
  fl_chart: ^0.66.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  url_launcher: ^6.2.4
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  workmanager: ^0.6.0
  permission_handler: ^11.3.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/icon_full.png"
  image_path_ios: "assets/images/icon_full.png"
  adaptive_icon_background: "#1A237E"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"
